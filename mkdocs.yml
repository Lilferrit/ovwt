site_name: ovwt
site_description: XGBoost variant vs. wild-type classifier for CellProfiler features
repo_url: ""

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

nav:
  - Home: index.md
  - Usage: usage.md
  - Configuration: configuration.md
  - API Reference: api.md
